<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 CHOOSE A FILE - CUMPLE AXEL 🍄</title>

<!-- Fuentes: Arcade para la interfaz y Fredoka para el estilo redondeado de Mario -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
/* =========================
   CONFIGURACIÓN GENERAL
========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Fredoka', sans-serif;
  color: #333;
  
  /* LECTURA DEL NUEVO FONDO JPG CON CAPA TRANSLÚCIDA EQUILIBRADA */
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), 
    url('fondo.jpg'); 
  
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 12px;
}

.container {
  width: 100%;
  max-width: 430px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* Encabezado superior de la pantalla "Choose a file" */
.screen-header {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.8rem;
  color: #fff;
  text-shadow: 3px 3px 0px #000;
  margin-bottom: 25px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* =========================
   BLOQUES AMARILLOS "?" CON BRINCO RETRO
========================= */
.decorations-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.lucky-block {
  width: 45px;
  height: 45px;
  background: #f2a900;
  border: 4px solid #000;
  border-radius: 4px;
  box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 6px 0px rgba(0,0,0,0.3);
  font-family: 'Press Start 2P', monospace;
  color: #fff;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 2px 2px 0px #b57602;
  animation: brincoBloque 1.2s infinite ease-in-out alternate;
}

.lucky-block:nth-child(2) {
  animation-delay: 0.3s;
}
.lucky-block:nth-child(3) {
  animation-delay: 0.6s;
}

@keyframes brincoBloque {
  0% { transform: translateY(0); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 6px 0px rgba(0,0,0,0.3); }
  50% { transform: translateY(-10px); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 16px 10px rgba(0,0,0,0.2); }
  100% { transform: translateY(0); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 6px 0px rgba(0,0,0,0.3); }
}

/* =========================
   SLOTS DE ARCHIVO DE GUARDADO
========================= */
.file-slot {
  background: #ffffff;
  border: 4px solid #7f7f7f;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: inset 0 -5px 0 #d9d9d9, 0 6px 12px rgba(0, 0, 0, 0.4);
  position: relative;
}

/* Slot 1 Activo con las esquinas resaltadas amarillas de Nintendo */
.file-slot.active {
  border: 4px solid #f29f05;
}
.file-slot.active::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border: 3px solid #f2cb05;
  border-radius: 12px;
  pointer-events: none;
}

.slot-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.file-number {
  font-size: 2.4rem;
  color: #f29f05;
  text-shadow: 2px 2px 0px #fff, 3px 3px 0px #b57602;
  font-weight: 900;
}

.file-title {
  font-size: 1.3rem;
  color: #000;
  font-weight: 700;
  text-align: left;
}

.file-subtitle {
  display: block;
  font-size: 0.7rem;
  color: #555;
  font-family: 'Press Start 2P', monospace;
  margin-top: 5px;
}

.slot-right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.65rem;
  color: #333;
  font-weight: bold;
}

/* =========================
   BOTONES DE ACCIÓN (ESTILO CORREGIDO)
========================= */
.action-bar {
  display: flex;
  gap: 12px;
  margin-top: 25px;
}

.btn-ds {
  flex: 1;
  border-radius: 10px;
  color: #fff;
  padding: 16px 10px;
  font-size: 0.85rem;
  font-weight: bold;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 0px rgba(0,0,0,0.3);
  transition: all 0.1s;
  border: 4px solid #000;
}

.btn-ds:active {
  transform: translateY(4px);
  box-shadow: none;
}

/* Botón Ubicación */
.btn-maps {
  background: #f29f05;
  box-shadow: 0 6px 0px #b57602, 0 6px 10px rgba(0,0,0,0.4);
}
.btn-maps:active {
  box-shadow: inset 0 4px 0 rgba(0,0,0,0.2);
}

/* Botón WhatsApp */
.btn-wa {
  background: #43b012;
  box-shadow: 0 6px 0px #2b730b, 0 6px 10px rgba(0,0,0,0.4);
}
.btn-wa:active {
  box-shadow: inset 0 4px 0 rgba(0,0,0,0.2);
}

</style>
</head>

<body>

  <div class="container">

    <!-- TÍTULO DE LA PANTALLA -->
    <h1 class="screen-header">CHOOSE A FILE</h1>

    <!-- NUEVOS CUADROS "?" ANIMADOS CON BRINCO LENTO -->
    <div class="decorations-container">
      <div class="lucky-block">?</div>
      <div class="lucky-block">?</div>
      <div class="lucky-block">?</div>
    </div>

    <!-- SLOT 1: FECHA -->
    <div class="file-slot active">
      <div class="slot-left">
        <span class="file-number">1</span>
        <div class="file-title">
          WHEN / FECHA
          <span class="file-subtitle">SABADO 15 AGOSTO</span>
        </div>
      </div>
      <div class="slot-right">
        ⏰ 16:00
      </div>
    </div>

    <!-- SLOT 2: UBICACIÓN -->
    <div class="file-slot">
      <div class="slot-left">
        <span class="file-number">2</span>
        <div class="file-title">
          WORLD / LUGAR
          <span class="file-subtitle">CASTILLO DE AXEL</span>
        </div>
      </div>
      <div class="slot-right">
        🍄 x05
      </div>
    </div>

    <!-- SLOT 3: NOTA EXTRA -->
    <div class="file-slot">
      <div class="slot-left">
        <span class="file-number">3</span>
        <div class="file-title">
          NEW GAME / NOTA
          <span class="file-subtitle">¡TRAER MUCHAS GANAS!</span>
        </div>
      </div>
      <div class="slot-right">
        👑 x01
      </div>
    </div>

    <!-- BARRA INFERIOR DE BOTONES DE CONTROL DE MENÚ -->
    <footer class="action-bar">
      <!-- Enlace oficial directo de Google Maps corregido -->
      <a href="https://maps.app.goo.gl/jgrZHijcdZ9PbRzB6" target="_blank" class="btn-ds btn-maps">📍 VER MAPA</a>
      
      <!-- Enlace oficial wa.me corregido con número limpio internacional y mensaje codificado -->
      <a href="https://wa.me" target="_blank" class="btn-ds btn-wa">🟢 CONFIRMAR</a>
    </footer>

  </div>

</body>
</html>
