<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏎️ MARIO KART - CUMPLE AXEL 🍄</title>

<!-- Fuente Arcade Oficial de Google Fonts -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
/* =========================
   CONFIGURACIÓN GENERAL
========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Press Start 2P', monospace;
  color: #fff;
  
  /* LECTURA LOCAL: Cambia a fondo.jpg si tu formato descargado es JPG */
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
    url('fondo.png'); 
  
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px 14px;
}

/* =========================
   CONTENEDOR DEL MENÚ DE SELECCIÓN
========================= */
.menu-container {
  width: 100%;
  max-width: 410px;
  text-align: center;
}

/* TÍTULO ESTILO LOGO TRIANGULAR DE MARIO KART */
.game-title {
  margin-bottom: 25px;
}

.title-super {
  font-size: 1.4rem;
  color: #fff;
  display: block;
  letter-spacing: 2px;
  text-shadow: 3px 3px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000;
}

.title-main {
  font-size: 2.5rem;
  color: #fcd85c; /* Amarillo brillante */
  display: block;
  letter-spacing: 2px;
  margin-top: 5px;
  text-shadow: 4px 4px 0px #e52521, -2px -2px 0px #000, 2px -2px 0px #000, 4px 4px 5px #000;
}

/* =========================
   CAJA DE MENÚ (ESTILO INTERFAZ DE NINTENDO SWITCH)
========================= */
.menu-box {
  background: rgba(0, 0, 0, 0.85); /* Fondo oscuro para resaltar sobre la imagen */
  border: 4px solid #fff;
  border-radius: 12px;
  padding: 20px 15px;
  box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.7);
  margin-bottom: 25px;
}

.menu-option {
  display: flex;
  align-items: center;
  text-align: left;
  padding: 12px 8px;
  margin: 8px 0;
  font-size: 0.58rem;
  line-height: 1.6;
  border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
}

.menu-option:last-child {
  border-bottom: none;
}

/* Selector dinámico parpadeante (Carrito de carreras) */
.menu-option::before {
  content: "🏎️";
  margin-right: 12px;
  font-size: 0.8rem;
  animation: acelerar 0.5s steps(2) infinite alternate;
}

@keyframes acelerar {
  from { transform: translateX(0); }
  to { transform: translateX(4px); }
}

.menu-label {
  color: #ff3333; /* Rojo para los títulos internos */
  display: block;
  font-size: 0.5rem;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.menu-value {
  color: #fff;
}

/* =========================
   BOTONES ESTILO MENU DE SELECCIÓN DE PISTA
========================= */
.action-buttons {
  width: 100%;
}

.btn-arcade {
  display: block;
  width: 100%;
  padding: 16px 10px;
  margin-top: 15px;
  border-radius: 8px;
  text-decoration: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  font-weight: bold;
  text-align: center;
  border: 4px solid #fff;
  color: #fff;
  background: rgba(0, 0, 0, 0.9);
  box-shadow: 0px 5px 0px #fff;
  transition: all 0.1s;
}

/* Efecto de presionar el botón físico */
.btn-arcade:active {
  transform: translateY(4px);
  box-shadow: 0px 1px 0px #fff;
}

/* Botón Mapa - Estilo Copa Relámpago */
.btn-location {
  border-color: #fcd85c;
  color: #fcd85c;
  box-shadow: 0px 5px 0px #fcd85c;
}
.btn-location:active {
  box-shadow: 0px 1px 0px #fcd85c;
}

/* Botón Confirmar - Estilo Copa Champiñón */
.btn-whatsapp {
  border-color: #43b012;
  color: #43b012;
  box-shadow: 0px 5px 0px #43b012;
}
.btn-whatsapp:active {
  box-shadow: 0px 1px 0px #43b012;
}

</style>
</head>

<body>

  <div class="menu-container">

    <!-- LOGOTIPO CENTRAL ESTILO RACING -->
    <div class="game-title">
      <span class="title-super">SUPER</span>
      <span class="title-main">AXEL 8</span>
    </div>

    <!-- PANTALLA DE SELECCIÓN DE CARRERA -->
    <div class="menu-box">
      
      <!-- Fila: Fecha -->
      <div class="menu-option">
        <div>
          <span class="menu-label">START TIME / FECHA</span>
          <span class="menu-value">SÁBADO 15 AGOSTO — 16:00 HS</span>
        </div>
      </div>

      <!-- Fila: Circuito / Lugar -->
      <div class="menu-option">
        <div>
          <span class="menu-label">GRAND PRIX / CIRCUITO</span>
          <span class="menu-value">CASTILLO DE AXEL (MUNDO 1)</span>
        </div>
      </div>

      <!-- Fila: Reglas -->
      <div class="menu-option">
        <div>
          <span class="menu-label">RACE RULES / NOTA</span>
          <span class="menu-value">¡TRAER MUCHAS GANAS DE DIVERTIRSE!</span>
        </div>
      </div>

    </div>

    <!-- BOTONES DE MENÚ DE SELECCIÓN -->
    <div class="action-buttons">
      <!-- Enlace directo a tu Google Maps -->
      <a href="https://goo.gl" target="_blank" class="btn-arcade btn-location">🏁 VER CIRCUITO (MAPA)</a>
      
      <!-- Enlace universal directo a tu WhatsApp Personal -->
      <a href="https://wa.me" target="_blank" class="btn-arcade btn-whatsapp">🎮 OK - CONFIRMAR DRIVER</a>
    </div>

  </div>

</body>
</html>
