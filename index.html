       CONFIGURACIÓN GENERAL
       Inspirada en el cielo y los campos de Super Mario.
    ========================= */
    * { box-sizing: border-box; }

      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      /* Tipografía estilo 8-bits. Usa 'Press Start 2P' de Google Fonts si quieres mayor fidelidad */
      font-family: 'Courier New', Courier, monospace;
      color: #222;
      background: linear-gradient(to bottom, #48c9f5 0%, #9beaff 60%, #79d64a 60%, #79d64a 100%);
      padding-bottom: 120px; /* Espacio para el suelo */
    }

    .cloud1 { top: 5%; left: -170px; animation-duration: 45s; }
    .cloud2 { top: 22%; left: -270px; animation-duration: 60s; animation-delay: 12s; scale: 1.3; }
    @keyframes moverNube { from { left: -300px; } to { left: 100vw; } }

    /* TUBERÍAS (CSS Mejorado) */
    .pipe {
      position: absolute;
      z-index: 2; /* Detrás de la tarjeta */
      bottom: 0;
      width: 90px;
      height: 120px;
      background: linear-gradient(to right, #168d35, #40c951, #168d35);
      border: 6px solid #096823;
      border-radius: 10px 10px 0 0;
      pointer-events: none;
    }
    .pipe::before {
      content: "";
      position: absolute;
      top: -25px;
      left: -10px;
      width: 110px;
      height: 35px;
      background: linear-gradient(to right, #168d35, #40c951, #168d35);
      border: 6px solid #096823;
      border-radius: 10px;
    }
    .pipe1 { left: -15px; z-index: 1; } /* Tubería izquierda, detrás del suelo */
    .pipe2 { right: -15px; z-index: 1; } /* Tubería derecha, detrás del suelo */

    /* SUELO DECORATIVO (CSS Mejorado) */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      z-index: 2; /* Delante de las tuberías */
      background:
        repeating-linear-gradient(
          90deg,
          #8b4b24 0px, #8b4b24 40px,
          #6e381d 40px, #6e381d 45px
        );
      border-top: 16px solid #55b936;
    }

    /* =========================
       TARJETA PRINCIPAL (La Caja "Misterio")
    ========================= */
    .container {
      position: relative;
      z-index: 3; /* Delante de todo el fondo */
      width: 95%;
      max-width: 550px;
      margin: 0 auto;
      padding-top: 50px;
      padding-bottom: 50px;
    }

    .card {
      position: relative;
      background: #fff;
      border-radius: 25px;
      padding: 30px 25px 40px;
      border: 8px solid #e52521;
      box-shadow:
        0 0 0 6px #ffd21f,
        0 12px 0 #a71917,
        0 25px 50px rgba(0,0,0,.4);
      overflow: visible; /* Para que los personajes sobresalgan */
    }

    /* Decoración interior (Estrellas CSS) */
    .card::before {
      content: "★ ✦ ★ ✦ ★ ✦ ★";
      position: absolute;
      top: 15px; left: 0; right: 0;
      color: #f2b900;
      font-size: 22px;
      letter-spacing: 6px;
      opacity: .8;
    }

    /* =========================
       CABECERA DE LA TARJETA
    ========================= */
    .header-icons {
      margin-top: 25px;
      margin-bottom: 10px;
      height: 70px; /* Espacio para el logo */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-mario {
      max-height: 100%;
      filter: drop-shadow(4px 4px 0 #a71917);
    }

    .invitation-title {
      margin-top: 15px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      text-shadow: 2px 2px 0 #ccc;
    }

    h1 {
      margin: 8px 0;
      font-size: clamp(3.5rem, 16vw, 6rem);
      color: #e52521;
      font-weight: 900; /* Estilo bloque */
      text-shadow:
        6px 6px 0 #ffd21f,
        10px 10px 0 #9c1b19;
      letter-spacing: 4px;
      font-family: 'Impact', fantasy; /* Sugerencia para efecto bloque */
    }

    .subtitle {
      font-size: 1.4rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 25px;
      text-shadow: 2px 2px 0 #ccc;
    }

    ========================= */
