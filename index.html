<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fuentes: Arcade para contadores y Fredoka para el estilo divertido/infantil de Mario -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
/* =========================
   CONFIGURACIÓN GENERAL
========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Fredoka', sans-serif;
  color: #333;
  
  /* LECTURA DEL FONDO LOCAL */
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15)), 
    url('fondo.jpg'); 
  
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px 12px;
}

.container {
  width: 100%;
  max-width: 430px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* =========================
   ENCABEZADO ANIMADO LETRA POR LETRA
========================= */
.playful-header {
  margin-bottom: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.playful-invitacion, .playful-nivel {
  display: block;
  font-weight: 900;
  letter-spacing: 1px;
}

.playful-invitacion {
  font-size: 1.4rem;
  color: #fff;
  text-shadow: 3px 3px 0px #000;
  margin-bottom: 2px;
}

.playful-nivel {
  font-size: 1.3rem;
  color: #fcd85c;
  text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000;
  margin-top: 4px;
}

.playful-name {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 5px 0;
}

.playful-invitacion span, .playful-nivel span, .playful-name span {
  display: inline-block;
  animation: brincoLetraIndividual 1.6s infinite ease-in-out;
}

@keyframes brincoLetraIndividual {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-10px); }
  50% { transform: translateY(0); }
}

.letter {
  font-size: 3.4rem;
  font-weight: 900;
  text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
}
.letter:nth-child(1) { color: #e52521; transform: rotate(-6deg); animation-delay: 0.3s; }
.letter:nth-child(2) { color: #002fbe; transform: rotate(5deg); animation-delay: 0.4s; }
.letter:nth-child(3) { color: #fcd85c; transform: rotate(-4deg); animation-delay: 0.5s; }
.letter:nth-child(4) { color: #43b047; transform: rotate(7deg); animation-delay: 0.6s; }

.playful-invitacion span:nth-child(1)  { animation-delay: 0.00s; }
.playful-invitacion span:nth-child(2)  { animation-delay: 0.05s; }
.playful-invitacion span:nth-child(3)  { animation-delay: 0.10s; }
.playful-invitacion span:nth-child(4)  { animation-delay: 0.15s; }
.playful-invitacion span:nth-child(5)  { animation-delay: 0.20s; }
.playful-invitacion span:nth-child(6)  { animation-delay: 0.25s; }
.playful-invitacion span:nth-child(7)  { animation-delay: 0.30s; }
.playful-invitacion span:nth-child(8)  { animation-delay: 0.35s; }
.playful-invitacion span:nth-child(9)  { animation-delay: 0.40s; }
.playful-invitacion span:nth-child(10) { animation-delay: 0.45s; }
.playful-invitacion span:nth-child(11) { animation-delay: 0.50s; }
.playful-invitacion span:nth-child(12) { animation-delay: 0.55s; }
.playful-invitacion span:nth-child(13) { animation-delay: 0.60s; }
.playful-invitacion span:nth-child(14) { animation-delay: 0.65s; }
.playful-invitacion span:nth-child(15) { animation-delay: 0.70s; }
.playful-invitacion span:nth-child(16) { animation-delay: 0.75s; }

.playful-nivel span:nth-child(1)  { animation-delay: 0.50s; }
.playful-nivel span:nth-child(2)  { animation-delay: 0.55s; }
.playful-nivel span:nth-child(3)  { animation-delay: 0.60s; }
.playful-nivel span:nth-child(4)  { animation-delay: 0.65s; }
.playful-nivel span:nth-child(5)  { animation-delay: 0.70s; }
.playful-nivel span:nth-child(6)  { animation-delay: 0.75s; }
.playful-nivel span:nth-child(7)  { animation-delay: 0.80s; }
.playful-nivel span:nth-child(8)  { animation-delay: 0.85s; }
.playful-nivel span:nth-child(9)  { animation-delay: 0.90s; }
.playful-nivel span:nth-child(10) { animation-delay: 0.95s; }
.playful-nivel span:nth-child(11) { animation-delay: 1.00s; }
.playful-nivel span:nth-child(12) { animation-delay: 1.05s; }
.playful-nivel span:nth-child(13) { animation-delay: 1.10s; }
.playful-nivel span:nth-child(14) { animation-delay: 1.15s; }
.playful-nivel span:nth-child(15) { animation-delay: 1.20s; }
.playful-nivel span:nth-child(16) { animation-delay: 1.25s; }
.playful-nivel span:nth-child(17) { animation-delay: 1.30s; }
.playful-nivel span:nth-child(18) { animation-delay: 1.35s; }

/* =========================
   BLOQUES AMARILLOS "?" 
========================= */
.decorations-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.lucky-block {
  width: 44px;
  height: 44px;
  background: #f2a900;
  border: 4px solid #000;
  border-radius: 4px;
  box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 5px 0px rgba(0,0,0,0.3);
  font-family: 'Press Start 2P', monospace;
  color: #fff;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 2px 2px 0px #b57602;
  animation: brincoBloque 1.4s infinite ease-in-out alternate;
}

.lucky-block:nth-child(2) { animation-delay: 0.3s; }
.lucky-block:nth-child(3) { animation-delay: 0.6s; }

@keyframes brincoBloque {
  0% { transform: translateY(0); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 5px 0px rgba(0,0,0,0.3); }
  50% { transform: translateY(-8px); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 13px 8px rgba(0,0,0,0.25); }
  100% { transform: translateY(0); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 5px 0px rgba(0,0,0,0.3); }
}

/* =========================
   TARJETAS DE INFORMACIÓN (SECUENCIA)
========================= */
.slots-wrapper {
  width: 100%;
}

.file-slot {
  background: #ffffff;
  border: 4px solid #7f7f7f;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: inset 0 -5px 0 #d9d9d9, 0 6px 12px rgba(0, 0, 0, 0.4);
  position: relative;
  animation: movimientoSecuencial 3s infinite ease-in-out alternate;
}

.file-slot:nth-of-type(1) { animation-delay: 0s; }
.file-slot:nth-of-type(2) { animation-delay: 0.5s; }
.file-slot:nth-of-type(3) { animation-delay: 1s; }

@keyframes movimientoSecuencial {
  0% { transform: translateX(-10px); }
  100% { transform: translateX(10px); }
}

.file-slot.active {
  border: 4px solid #f29f05;
}
.file-slot.active::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border: 3px solid #f2cb05;
  border-radius: 12px;
  pointer-events: none;
}

.slot-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.file-number {
  font-size: 2.4rem;
  color: #f29f05;
  text-shadow: 2px 2px 0px #fff, 3px 3px 0px #b57602;
  font-weight: 900;
}

.file-title {
  font-size: 1.25rem;
  color: #000;
  font-weight: 700;
  text-align: left;
}

.file-subtitle {
  display: block;
  font-size: 0.68rem;
  color: #333;
  font-family: 'Press Start 2P', monospace;
  margin-top: 6px;
  line-height: 1.4;
}

.slot-right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.62rem;
  color: #222;
  font-weight: bold;
  white-space: nowrap;
}

/* =========================
   ESTILOS DE TUS BOTONES ORIGINALES
========================= */
.buttons {
  margin-top: 25px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: block;
  width: 100%;
  border-radius: 10px;
  color: #fff;
  padding: 16px 10px;
  font-size: 0.85rem;
  font-weight: bold;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  border: 4px solid #000;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

.btn:active {
  transform: translateY(4px);
  box-shadow: none;
}

.whatsapp {
  background: #43b012;
  box-shadow: 0 6px 0px #2b730b, 0 6px 10px rgba(0,0,0,0.4);
}

.location {
  background: #f29f05;
  box-shadow: 0 6px 0px #b57602, 0 6px 10px rgba(0,0,0,0.4);
}

.calendar {
  background: #e52521;
  box-shadow: 0 6px 0px #9c1b19, 0 6px 10px rgba(0,0,0,0.4);
}

.footer {
  margin-top: 20px;
  font-size: 0.68rem;
  color: #fff;
  text-shadow: 2px 2px 0px #000;
  font-family: 'Press Start 2P', monospace;
}
</style>
</head>
