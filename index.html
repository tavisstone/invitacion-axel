<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 ¡Cumpleaños de Axel! 🍄</title>

<!-- Fuentes: Arcade para contadores y Fredoka para el estilo divertido/infantil de Mario -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
/* =========================
   CONFIGURACIÓN GENERAL
========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Fredoka', sans-serif;
  color: #333;
  
  /* LECTURA DEL NUEVO FONDO JPG PROVISTO */
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15)), 
    url('fondo.jpg'); 
  
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px 12px;
}

.container {
  width: 100%;
  max-width: 430px;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* =========================
   NUEVO ENCABEZADO SUPERIOR DIVERTIDO E INFANTIL
========================= */
.playful-header {
  margin-bottom: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.playful-invitacion {
  font-size: 1.4rem;
  color: #fff;
  text-shadow: 3px 3px 0px #000;
  letter-spacing: 1px;
  font-weight: 900;
  transform: rotate(-2deg);
  margin-bottom: 2px;
}

/* Efecto de letras de colores para el nombre AXEL */
.playful-name {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 5px 0;
  transform: scale(1.05);
}

.letter {
  font-size: 3.4rem;
  font-weight: 900;
  text-shadow: 4px 4px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000;
  display: inline-block;
}
.letter:nth-child(1) { color: #e52521; transform: rotate(-6deg) translateY(-2px); } /* A - Rojo */
.letter:nth-child(2) { color: #002fbe; transform: rotate(5deg) translateY(3px); }  /* X - Azul */
.letter:nth-child(3) { color: #fcd85c; transform: rotate(-4deg) translateY(-4px); } /* E - Amarillo */
.letter:nth-child(4) { color: #43b047; transform: rotate(7deg) translateY(1px); }  /* L - Verde */

.playful-nivel {
  font-size: 1.3rem;
  color: #fcd85c;
  text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000;
  font-weight: 900;
  letter-spacing: 0.5px;
  margin-top: 4px;
  transform: rotate(1deg);
}

/* =========================
   BLOQUES AMARILLOS "?" (MOVIMIENTO DE BRINQUITO TENUE)
========================= */
.decorations-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.lucky-block {
  width: 44px;
  height: 44px;
  background: #f2a900;
  border: 4px solid #000;
  border-radius: 4px;
  box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 5px 0px rgba(0,0,0,0.3);
  font-family: 'Press Start 2P', monospace;
  color: #fff;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 2px 2px 0px #b57602;
  animation: brincoBloque 1.4s infinite ease-in-out alternate;
}

.lucky-block:nth-child(2) { animation-delay: 0.3s; }
.lucky-block:nth-child(3) { animation-delay: 0.6s; }

@keyframes brincoBloque {
  0% { transform: translateY(0); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 5px 0px rgba(0,0,0,0.3); }
  50% { transform: translateY(-8px); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 13px 8px rgba(0,0,0,0.25); }
  100% { transform: translateY(0); box-shadow: inset -4px -4px 0px #b57602, inset 4px 4px 0px #ffdf7a, 0 5px 0px rgba(0,0,0,0.3); }
}

/* =========================
   TARJETAS DE INFORMACIÓN (MOVIMIENTO EN SECUENCIA DESFASADA)
========================= */
.file-slot {
  background: #ffffff;
  border: 4px solid #7f7f7f;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: inset 0 -5px 0 #d9d9d9, 0 6px 12px rgba(0, 0, 0, 0.4);
  position: relative;
  
  /* Animación base de vaivén horizontal */
  animation: movimientoSecuencial 3s infinite ease-in-out alternate;
}

/* SEPARACIÓN DE TIEMPOS EXPRESA: Una tarjeta se mueve después de la otra */
.file-slot:nth-of-type(1) { animation-delay: 0s; }
.file-slot:nth-of-type(2) { animation-delay: 0.5s; }
.file-slot:nth-of-type(3) { animation-delay: 1s; }

@keyframes movimientoSecuencial {
  0% { transform: translateX(-10px); }
  100% { transform: translateX(10px); }
}

/* Ranura activa destacada con perfil amarillo */
.file-slot.active {
  border: 4px solid #f29f05;
}
.file-slot.active::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border: 3px solid #f2cb05;
  border-radius: 12px;
  pointer-events: none;
}

.slot-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.file-number {
  font-size: 2.4rem;
  color: #f29f05;
  text-shadow: 2px 2px 0px #fff, 3px 3px 0px #b57602;
  font-weight: 900;
}

.file-title {
  font-size: 1.25rem;
  color: #000;
  font-weight: 700;
  text-align: left;
}

.file-subtitle {
  display: block;
  font-size: 0.68rem;
  color: #333;
  font-family: 'Press Start 2P', monospace;
  margin-top: 6px;
  line-height: 1.4;
}

.slot-right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.62rem;
  color: #222;
  font-weight: bold;
  white-space: nowrap;
}

/* =========================
   BOTONES DE ACCIÓN (ESTILO SLOT)
========================= */
.action-bar {
  display: flex;
  gap: 12px;
  margin-top: 25px;
}

.btn-ds {
  flex: 1;
  border-radius: 10px;
  color: #fff;
  padding: 16px 10px;
  font-size: 0.85rem;
  font-weight: bold;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 0px rgba(0,0,0,0.3);
  transition: all 0.1s;
  border: 4px solid #000;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

.btn-ds:active {
  transform: translateY(4px);
  box-shadow: none;
}

.btn-maps {
  background: #f29f05;
  box-shadow: 0 6px 0px #b57602, 0 6px 10px rgba(0,0,0,0.4);
}

.btn-wa {
  background: #43b012;
  box-shadow: 0 6px 0px #2b730b, 0 6px 10px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

  <div class="container">

    <!-- NUEVO ENCABEZADO DE LETRAS DE COLORES AL CENTRO -->
    <header class="playful-header">
      <span class="playful-invitacion">¡ESTAS INVITADO!</span>
      <div class="playful-name">
        <span class="letter">A</span>
        <span class="letter">X</span>
        <span class="letter">E</span>
        <span class="letter">L</span>
      </div>
      <span class="playful-nivel">¡NIVEL CUMPLEAÑOS!</span>
    </header>

    <!-- CUADROS "?" CON BRINCO TENUE -->
    <div class="decorations-container">
      <div class="lucky-block">?</div>
      <div class="lucky-block">?</div>
      <div class="lucky-block">?</div>
    </div>

    <!-- CONTENEDOR GRUPAL DE ENTRADAS INFORMATIVAS CON RESPUESTA SECUENCIAL -->
    <div class="slots-wrapper">
      
      <!-- SLOT 1: FECHA -->
      <div class="file-slot active">
        <div class="slot-left">
          <span class="file-number">1</span>
          <div class="file-title">
            WHEN / FECHA
            <span class="file-subtitle">SABADO 7 DE NOVIEMBRE</span>
          </div>
        </div>
        <div class="slot-right">
          ⏰ 16:00
        </div>
      </div>

      <!-- SLOT 2: UBICACIÓN -->
      <div class="file-slot">
        <div class="slot-left">
          <span class="file-number">2</span>
          <div class="file-title">
            WORLD / LUGAR
            <span class="file-subtitle">CASTILLO DE AXEL</span>
          </div>
        </div>
        <div class="slot-right">
          🍄 x05
        </div>
      </div>

      <!-- SLOT 3: NOTA EXTRA -->
      <div class="file-slot">
        <div class="slot-left">
          <span class="file-number">3</span>
          <div class="file-title">
            NEW GAME / NOTA
            <span class="file-subtitle">¡TRAER MUCHAS GANAS DE DIVERTIRTE !</span>
          </div>
        </div>
        <div class="slot-right">
          👑 x01
        </div>
      </div>

    </div>

    <!-- BARRA INFERIOR DE BOTONES DE CONTROL DE MENÚ -->
    <footer class="action-bar">
      <!-- URL EXTENDIDA DE ESCRITORIO DE GOOGLE MAPS PARA REMOVER COMPORTAMIENTO DE FIREBASE -->
      <a href="https://google.com" target="_blank" class="btn-ds btn-maps">📍 VER MAPA</a>
      
      <!-- PASARELA API INTERNACIONAL COMPLETA FORZADA PARA CORREGIR REDIRECCIÓN EN WHATSAPP MESSENGER -->
      <a href="https://whatsapp.com" target="_blank" class="btn-ds btn-wa">🟢 CONFIRMAR</a>
    </footer>

  </div>

</body>
</html>
