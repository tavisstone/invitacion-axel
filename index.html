<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 CHOOSE A FILE - CUMPLE AXEL 🍄</title>

<!-- Fuentes: Arcade para interfaz y Fredoka para el estilo redondeado de Mario -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
/* =========================
   CONFIGURACIÓN GENERAL
========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Fredoka', sans-serif; /* Tipografía más moderna tipo Mario */
  color: #333;
  
  /* Tu imagen de fondo local con capa oscura para legibilidad */
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
    url('fondo.png'); 
  
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 12px;
}

.container {
  width: 100%;
  max-width: 430px;
  text-align: center;
}

/* Encabezado superior de la pantalla "Choose a file" */
.screen-header {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.6rem;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  margin-bottom: 25px;
  letter-spacing: 0.5px;
}

/* =========================
   SLOTS DE ARCHIVO DE GUARDADO (ESTILO IMAGEN)
========================= */
.file-slot {
  background: #ffffff;
  border: 3px solid #7f7f7f;
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: inset 0 -4px 0 #d9d9d9, 0 6px 12px rgba(0, 0, 0, 0.4);
  position: relative;
}

/* Archivo Activo/Seleccionado (Slot 1 - Axel) con esquinas naranjas */
.file-slot.active {
  border: 4px solid #f29f05;
}
.file-slot.active::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border: 3px solid #f2cb05;
  border-radius: 12px;
  pointer-events: none;
}

/* Contenido izquierdo: Número y Título principal */
.slot-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.file-number {
  font-size: 2.2rem;
  color: #f29f05; /* Amarillo oscuro de la imagen */
  text-shadow: 2px 2px 0px #fff, 3px 3px 0px #b57602;
  font-weight: 900;
}

.file-title {
  font-size: 1.4rem;
  color: #000;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-align: left;
}

.file-subtitle {
  display: block;
  font-size: 0.75rem;
  color: #666;
  font-family: 'Press Start 2P', monospace;
  margin-top: 4px;
}

/* Contenido derecho: Iconos decorativos y contadores */
.slot-right {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.65rem;
  color: #555;
}

.icon-star {
  color: #f2cb05;
  font-size: 1.1rem;
}

/* =========================
   BOTONES DE ACCIÓN INFERIORES (ESTILO MENÚ DS)
========================= */
.action-bar {
  display: flex;
  gap: 10px;
  margin-top: 25px;
}

.btn-ds {
  flex: 1;
  background: linear-gradient(to bottom, #4c4c4c 0%, #262626 100%);
  border: 3px solid #1a1a1a;
  border-radius: 8px;
  color: #fff;
  padding: 14px 8px;
  font-size: 0.85rem;
  font-weight: bold;
  text-decoration: none;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 8px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.1s;
}

.btn-ds:active {
  transform: translateY(3px);
  box-shadow: none;
}

/* Colores para destacar los botones estilo Nintendo */
.btn-maps {
  background: linear-gradient(to bottom, #f29f05 0%, #c78202 100%);
  border-color: #9c6601;
}
.btn-wa {
  background: linear-gradient(to bottom, #43b012 0%, #2b730b 100%);
  border-color: #1e5207;
}

</style>
</head>

<body>

  <div class="container">

    <!-- TÍTULO DE LA PANTALLA -->
    <h1 class="screen-header">Choose a file.</h1>

    <!-- SLOT 1: FECHA -->
    <div class="file-slot active">
      <div class="slot-left">
        <span class="file-number">1</span>
        <div class="file-title">
          WHEN / FECHA
          <span class="file-subtitle">SABADO 21 NOVIEMBRE</span>
        </div>
      </div>
      <div class="slot-right">
        <span class="icon-star">★</span> 👨%3A00 PM
      </div>
    </div>

    <!-- SLOT 2: UBICACIÓN -->
    <div class="file-slot">
      <div class="slot-left">
        <span class="file-number">2</span>
        <div class="file-title">
          WORLD / LUGAR
          <span class="file-subtitle">CASTILLO DE AXEL</span>
        </div>
      </div>
      <div class="slot-right">
        🍄x05
      </div>
    </div>

    <!-- SLOT 3: NOTA EXTRA -->
    <div class="file-slot">
      <div class="slot-left">
        <span class="file-number">3</span>
        <div class="file-title">
          NEW GAME / NOTA
          <span class="file-subtitle">¡TRAER MUCHAS GANAS!</span>
        </div>
      </div>
      <div class="slot-right">
        👑x01
      </div>
    </div>

    <!-- BARRA INFERIOR DE BOTONES (ESTILO NINTENDO DS) -->
    <footer class="action-bar">
      <!-- Enlace directo a tu Google Maps -->
      <a href="https://goo.gl" target="_blank" class="btn-ds btn-maps">📍 VER MAPA</a>
      
      <!-- Enlace universal directo a tu WhatsApp Personal -->
      <a href="https://wa.me" target="_blank" class="btn-ds btn-wa">🟢 CONFIRMAR</a>
    </footer>

  </div>

</body>
</html>
