<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 ¡Cumpleaños de Axel! 🍄</title>

<!-- Fuente estilo Arcade de Google Fonts -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
/* =========================
   CONFIGURACIÓN GENERAL
========================= */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Press Start 2P', monospace, Arial, sans-serif;
  color: #222;
  /* Fondo Celeste Oficial de Super Mario */
  background-color: #5c94fc; 
  padding-bottom: 80px;
}

/* =========================
   CONTENEDOR PRINCIPAL (ESTILO AFICHE DE LA IMAGEN)
========================= */
.container {
  position: relative;
  z-index: 5;
  width: 100%;
  max-width: 440px;
  margin: 0 auto;
  padding: 20px 10px;
}

/* =========================
   LOGO PRINCIPAL "SUPER AXEL" (3D EFECTO)
========================= */
.logo-container {
  text-align: center;
  margin-top: 15px;
  margin-bottom: 10px;
}

.logo-super {
  font-size: 2.2rem;
  color: #fcd85c; /* Amarillo */
  text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
  letter-spacing: 2px;
  display: block;
}

.logo-name {
  font-size: 2.8rem;
  color: #e52521; /* Rojo */
  text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
  letter-spacing: 3px;
  display: block;
  margin-top: -5px;
}

.subtitle-cumple {
  font-size: 0.9rem;
  color: #fff;
  text-shadow: 3px 3px 0 #000;
  text-align: center;
  margin-bottom: 25px;
}

/* =========================
   TIRA DE BLOQUES DE LADRILLO CENTRALES
========================= */
.brick-row {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 20px 0;
  width: 100%;
}

.brick, .block-q {
  width: 50px;
  height: 50px;
  border: 4px solid #000;
}

/* Bloque Ladrillo Marrón */
.brick {
  background: #b84a00;
  box-shadow: inset -4px -4px 0 #682000, inset 4px 4px 0 #f87830;
  position: relative;
}
.brick::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 4px;
  background: #000;
  top: 50%;
  margin-top: -2px;
  left: 0;
}

/* Bloque Sorpresa Amarillo ? */
.block-q {
  background: #fcbc34;
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset -4px -4px 0 #b87800, inset 4px 4px 0 #fff060;
  text-shadow: 3px 3px 0 #000;
  animation: flotar 1.5s ease-in-out infinite alternate;
}
.block-q:nth-child(even) {
  animation-delay: 0.5s;
}

@keyframes flotar {
  from { transform: translateY(0); }
  to { transform: translateY(-6px); }
}

/* =========================
   RENDER DE PERSONAJES REALES (SIN EMOTICONES)
========================= */
.mario-render-box {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: -10px 0 20px;
  position: relative;
  height: 200px;
}

.mario-img {
  width: 250px; /* Tamaño del render de Mario y Luigi saltando */
  height: auto;
  filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.3));
}

/* =========================
   CAJA DE DATOS DE LA INVITACIÓN
========================= */
.info-card {
  background: #fff9d7;
  border: 5px solid #000;
  border-radius: 12px;
  padding: 20px 15px;
  box-shadow: 6px 6px 0 rgba(0,0,0,0.2);
}

.info-item {
  margin-bottom: 20px;
  text-align: center;
}

.info-title {
  color: #e52521;
  font-size: 0.75rem;
  margin-bottom: 8px;
  text-shadow: 1px 1px 0 #fff;
}

.info-text {
  font-size: 0.65rem;
  line-height: 1.6;
  color: #000;
}

/* =========================
   BOTONES DE ACCIÓN 
========================= */
.buttons {
  margin-top: 20px;
}

.btn {
  display: block;
  width: 100%;
  padding: 15px 10px;
  margin-top: 12px;
  border-radius: 6px;
  text-decoration: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  border: 4px solid #000;
  transition: transform 0.1s;
  text-shadow: 2px 2px 0 #000;
}

.btn:active {
  transform: translateY(4px);
  box-shadow: none;
}

.location {
  background: #fcbc34;
  color: #fff;
  box-shadow: 0 5px 0 #b87800;
}

.whatsapp {
  background: #43b012;
  color: white;
  box-shadow: 0 5px 0 #28680b;
}

/* =========================
   SUELO DE MARIO INFERIOR FIJO
========================= */
.ground {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 55px;
  z-index: 10;
  background: 
    linear-gradient(to bottom, #73c721 0%, #73c721 20%, #4da110 20%, #4da110 30%, #d87828 30%, #d87828 100%);
  border-top: 5px solid #000;
  box-shadow: inset 0 25px 0 #984800;
}
</style>
</head>

<body>

<!-- INVITACIÓN PRINCIPAL -->
<main class="container">

  <!-- Encabezado estilo Logotipo 3D -->
  <div class="logo-container">
    <span class="logo-super">SUPER</span>
    <span class="logo-name">AXEL</span>
  </div>
  
  <div class="subtitle-cumple">CUMPLE 5</div>

  <!-- Tira Central de Bloques Ladrillo / Sorpresa -->
  <div class="brick-row">
    <div class="brick"></div>
    <div class="block-q">?</div>
    <div class="brick"></div>
    <div class="block-q">?</div>
    <div class="brick"></div>
  </div>

  <!-- IMAGEN RENDER OFICIAL (Mario y Luigi saltando juntos) -->
  <div class="mario-render-box">
    <img src="https://uncyc.org" alt="Mario y Luigi" class="mario-img">
  </div>

  <!-- Contenedor con la información del Evento -->
  <div class="info-card">
    
    <div class="info-item">
      <div class="info-title">📅 FECHA Y HORA</div>
      <div class="info-text">SÁBADO 15 DE AGOSTO<br>DE 16 A 19 HS</div>
    </div>

    <div class="info-item">
      <div class="info-title">📍 DIRECCIÓN</div>
      <div class="info-text">Av. Principal #123, Col. Centro<br>(Castillo de Axel)</div>
    </div>

    <!-- BOTONES -->
    <div class="buttons">
      <!-- Enlace verificado de tu Google Maps -->
      <a href="https://goo.gl" target="_blank" class="btn location">📍 VER UBICACIÓN</a>
      
      <!-- Enlace verificado de tu WhatsApp Personal sin redirección a Business -->
      <a href="https://wa.me" target="_blank" class="btn whatsapp">🟢 CONFIRMAR ASISTENCIA</a>
    </div>

  </div>

</main>

<!-- SUELO CLÁSICO DE SUPER MARIO BROS -->
<div class="ground"></div>

</body>
</html>
